// Initialize calendar events
INITIAL_STATE.calendarEvents = [

  { id: 6, title: 'Sports Day', type: 'event', date: 22, color: 'yellow' },
  { id: 7, title: 'Parent-Teacher Meet', type: 'meeting', date: 28, color: 'yellow' },

// ============================================================================
// STATE REDUCER
// ============================================================================

function appReducer(state, action) {
  switch (action.type) {
    case 'LOGIN':
      return {
        ...state,
        currentUser: action.payload.user,
        userType: action.payload.userType
      };
    case 'LOGOUT':
      return { ...state, currentUser: null, userType: null };
    case 'MARK_ATTENDANCE':
      return {
        ...state,
        attendance: {
          ...state.attendance,
          [action.payload.studentId]: {
            ...state.attendance[action.payload.studentId],
            [action.payload.day]: action.payload.status
          }
        }
      };
    case 'SAVE_GRADES':
      return {
        ...state,
        grades: {
          ...state.grades,
          [action.payload.assessmentId]: action.payload.studentGrades
        }
      };
    case 'ADD_STUDENT':
      return {
        ...state,
        students: [...state.students, action.payload]
      };
    case 'ADD_ASSESSMENT':
      return {
        ...state,
        assessments: [...state.assessments, action.payload]
      };
    case 'ADD_EVENT':
      return {
        ...state,
        calendarEvents: [...state.calendarEvents, action.payload]
      };
    case 'REVOKE_CONSENT':
      return {
        ...state,
        consents: state.consents.filter(c => c.id !== action.payload)
      };
    case 'PUSH_TO_DIGILOCKER':
      return {
        ...state,
        documents: state.documents.map(d =>
          d.id === action.payload ? { ...d, apaarPushed: true } : d
        )
      };
    case 'MARK_NOTIFICATION_READ':
      return {
        ...state,
        notifications: state.notifications.map(n =>
          n.id === action.payload ? { ...n, read: true } : n
        )
      };
    default:
      return state;
  }
}

// ============================================================================
// SHARED COMPONENTS
// ============================================================================

function Card({ children, className = '' }) {
  return <div className={`bg-white rounded-lg shadow-sm border border-gray-100 ${className}`}>{children}</div>;
}

function Badge({ children, variant = 'gray', className = '' }) {
  const variants = {
    success: 'badge-success',
    warning: 'badge-warning',
    danger: 'badge-danger',
    info: 'badge-info',
    gray: 'bg-gray-100 text-gray-800'
  };
  return <span className={`inline-flex items-center px-3 py-1 rounded-full text-xs font-medium ${variants[variant]} ${className}`}>{children}</span>;
}

function Modal({ isOpen, onClose, title, children, size = 'md' }) {
  if (!isOpen) return null;
  const sizes = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-lg', xl: 'max-w-xl' };
  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center z-50">
      <Card className={`${sizes[size]} w-full mx-4`}>
        <div className="border-b border-gray-200 px-6 py-4 flex justify-between items-center">
          <h3 className="text-lg font-semibold">{title}</h3>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600">✕</button>
        </div>
        <div className="px-6 py-4">{children}</div>
      </Card>
    </div>
  );
}

function Toast({ message, type = 'success' }) {
  return (
    <div className={`toast ${type === 'success' ? 'border-l-4 border-l-green-500' : 'border-l-4 border-l-blue-500'}`}>
      <p className="text-sm font-medium">{message}</p>
    </div>
  );
}

function Button({ children, onClick, variant = 'primary', disabled = false, className = '', ...props }) {
  const variants = {
    primary: 'bg-primary hover:bg-blue-700 text-white',
    secondary: 'bg-secondary hover:bg-teal-700 text-white',
    outline: 'border-2 border-gray-300 text-gray-700 hover:bg-gray-50',
    danger: 'bg-red-500 hover:bg-red-600 text-white',
    ghost: 'text-primary hover:bg-blue-50'
  };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className={`px-4 py-2 rounded-lg font-medium transition-colors ${variants[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
      {...props}
    >
      {children}
    </button>
  );
}

function IconButton({ icon: Icon, onClick, className = '', title = '' }) {
  return (
    <button
      onClick={onClick}
      title={title}
      className={`p-2 rounded-lg hover:bg-gray-100 transition-colors ${className}`}
    >
      <Icon size={20} />
    </button>
  );
}

function StatCard({ label, value, icon: Icon, color = 'blue' }) {
  const colors = {
    blue: 'bg-blue-50 text-primary',
    green: 'bg-green-50 text-green-600',
    orange: 'bg-orange-50 text-orange-600',
    purple: 'bg-purple-50 text-purple-600'
  };
  return (
    <Card className="p-6">
      <div className="flex items-start justify-between">
        <div>
          <p className="text-gray-600 text-sm font-medium">{label}</p>
          <p className="text-2xl font-bold mt-2">{value}</p>
        </div>
        <div className={`${colors[color]} p-3 rounded-lg`}>
          <Icon size={24} />
        </div>
      </div>
    </Card>
  );
}

function StudentAttendance({ state }) {
  const currentStudent = state.students[0];
  const attendanceData = state.attendance[currentStudent.id] || {};
  const currentDate = new Date('2026-03-24');
  const monthDays = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();

  const stats = {
    present: Object.values(attendanceData).filter(s => s === 'present').length,
    absent: Object.values(attendanceData).filter(s => s === 'absent').length,
    late: Object.values(attendanceData).filter(s => s === 'late').length,
    holiday: Object.values(attendanceData).filter(s => s === 'holiday').length
  };

  const daysInWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();

  return (
    <div className="space-y-6">
      <h1 className="text-2xl font-bold">Attendance</h1>

      <div className="grid grid-cols-2 gap-3">
        <div className="badge-success p-4 rounded-lg">
          <p className="text-xs text-gray-600 font-medium">Present</p>
          <p className="text-2xl font-bold">{stats.present}</p>
        </div>
        <div className="badge-danger p-4 rounded-lg">
          <p className="text-xs text-gray-600 font-medium">Absent</p>
          <p className="text-2xl font-bold">{stats.absent}</p>
        </div>
        <div className="badge-warning p-4 rounded-lg">
          <p className="text-xs text-gray-600 font-medium">Late</p>
          <p className="text-2xl font-bold">{stats.late}</p>
        </div>
        <div className="bg-gray-100 p-4 rounded-lg">
          <p className="text-xs text-gray-600 font-medium">Holiday</p>
          <p className="text-2xl font-bold">{stats.holiday}</p>
        </div>
      </div>

      <Card className="p-6">
        <p className="text-center font-semibold text-lg mb-4">Attendance: {((stats.present / (monthDays - stats.holiday)) * 100).toFixed(1)}%</p>
        <div className="mb-2 flex gap-1 justify-between text-xs font-medium">
          {daysInWeek.map(d => <div key={d} className="w-[40px] text-center">{d}</div>)}
        </div>
        <div className="grid" style={{ gridTemplateColumns: 'repeat(7, 1fr)', gap: '4px' }}>
          {Array.from({ length: firstDay }).map((_, idx) => <div key={`empty-${idx}`} className="h-10"></div>)}
          {Array.from({ length: monthDays }).map((_, day) => {
            const status = attendanceData[day + 1] || 'present';
            const colors = { present: 'bg-green-200', absent: 'bg-red-200', late: 'bg-yellow-200', holiday: 'bg-gray-200' };
            return (
              <div key={day} className={`h-10 flex items-center justify-center rounded text-xs font-semibold ${colors[status]}`}>
                {day + 1}
              </div>

          })}
        </div>
      </Card>
    </div>
  );
}

function GradeEntry({ assessment, state, dispatch, onBack }) {
  const studentsInClass = state.students.filter(s => s.class === assessment.class);
  const [grades, setGrades] = useState({});

  const calculateGrade = (marks, maxMarks) => {
    const percentage = (marks / maxMarks) * 100;
    if (percentage > 90) return 'A1';
    if (percentage > 80) return 'A2';
    if (percentage > 70) return 'B1';
    if (percentage > 60) return 'B2';
    if (percentage > 50) return 'C1';
    if (percentage > 40) return 'C2';
    return 'D';
  };

  const stats = {
    average: studentsInClass.length > 0 ? (Object.values(grades).reduce((a, b) => a + (b || 0), 0) / studentsInClass.length).toFixed(1) : 0,
    highest: studentsInClass.length > 0 ? Math.max(...Object.values(grades).map(g => g || 0)) : 0,
    lowest: studentsInClass.length > 0 ? Math.min(...Object.values(grades).filter(g => g).map(g => g || 0)) : 0,
    passPercent: studentsInClass.length > 0 ? ((Object.values(grades).filter(g => g && g >= (assessment.maxMarks * 0.5)).length / studentsInClass.length) * 100).toFixed(1) : 0
  };

  return (
    <div className="space-y-6">
      <div>
        <Button onClick={onBack} variant="ghost" className="mb-4">← Back to Assessments</Button>
        <h1 className="text-3xl font-bold">{assessment.title}</h1>
        <p className="text-gray-600 text-sm mt-1">{assessment.subject} • {assessment.class} • Max Marks: {assessment.maxMarks}</p>
      </div>

      <div className="grid grid-cols-4 gap-4">
        <Card className="p-4">
          <p className="text-xs text-gray-600 font-medium">Average</p>
          <p className="text-2xl font-bold">{stats.average}</p>
        </Card>
        <Card className="p-4">
          <p className="text-xs text-gray-600 font-medium">Highest</p>
          <p className="text-2xl font-bold">{stats.highest}</p>
        </Card>
        <Card className="p-4">
          <p className="text-xs text-gray-600 font-medium">Lowest</p>
          <p className="text-2xl font-bold">{stats.lowest}</p>
        </Card>
        <Card className="p-4">
          <p className="text-xs text-gray-600 font-medium">Pass %</p>
          <p className="text-2xl font-bold">{stats.passPercent}%</p>
        </Card>
      </div>

      <Card className="overflow-x-auto">
        <table className="w-full">
          <thead className="bg-gray-50 border-b border-gray-200">
            <tr>
              <th className="px-4 py-3 text-left text-sm font-semibold">Roll No</th>
              <th className="px-4 py-3 text-left text-sm font-semibold">Student Name</th>
              <th className="px-4 py-3 text-left text-sm font-semibold">Marks ({assessment.maxMarks})</th>
              <th className="px-4 py-3 text-left text-sm font-semibold">Grade</th>
            </tr>
          </thead>
          <tbody className="divide-y divide-gray-200">
            {studentsInClass.map(student => {
              const mark = grades[student.id] || 0;
              const grade = mark > 0 ? calculateGrade(mark, assessment.maxMarks) : '-';
              return (
                <tr key={student.id} className="hover:bg-gray-50">
                  <td className="px-4 py-3 text-sm">{student.rollNo}</td>
                  <td className="px-4 py-3 text-sm font-medium">{student.name}</td>
                  <td className="px-4 py-3 text-sm">
                    <input
                      type="number"
                      min="0"
                      max={assessment.maxMarks}
                      value={mark}
                      onChange={(e) => setGrades({ ...grades, [student.id]: parseInt(e.target.value) || 0 })}
                      className="w-16 px-2 py-1 border border-gray-300 rounded text-sm"
                    />
                  </td>
                  <td className="px-4 py-3 text-sm">
                    <Badge variant={grade === '-' ? 'gray' : 'success'}>{grade}</Badge>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>

      <div className="flex gap-3">
        <Button variant="outline" className="flex-1">Save Draft</Button>
        <Button variant="primary" className="flex-1" onClick={() => {
          dispatch({ type: 'SAVE_GRADES', payload: { assessmentId: assessment.id, studentGrades: grades } });
          onBack();
        }}>
          Publish Grades
        </Button>
      </div>
    </div>
  );
}

function LoginPage({ onLogin, userType }) {
  const [step, setStep] = useState('phone');
  const [phone, setPhone] = useState('');
  const [otp, setOtp] = useState('');

  const handleSendOTP = () => {
    if (phone.match(/^\d{10}$/)) {
      setStep('otp');
    }
  };

  const handleVerifyOTP = () => {
    if (otp.length === 6) {
      const user = userType === 'student'
        ? { name: 'Aarav Sharma', id: 1, type: 'student', apaarId: '1234-5678-9012' }
        : { name: 'Priya Patel', id: 1, type: 'principal', organization: 'Delhi Public School' };
      onLogin(user, userType);
    }
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-primary to-secondary flex items-center justify-center p-4">
      <Card className="w-full max-w-md">
        <div className="p-8">
          <div className="text-center mb-8">
            <h1 className="text-3xl font-bold text-primary mb-2">EKAI</h1>
            <p className="text-gray-600 text-sm">
              {userType === 'student' ? 'Student Hub' : 'School Hub'}
            </p>
          </div>

          {step === 'phone' ? (
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium mb-2">Phone Number</label>
                <input
                  type="tel"
                  placeholder="10-digit mobile number"
                  maxLength="10"
                  value={phone}
                  onChange={(e) => setPhone(e.target.value.replace(/\D/g, ''))}
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary"
                />
                <p className="text-xs text-gray-500 mt-1">You'll receive an OTP on this number</p>
              </div>
              <Button
                onClick={handleSendOTP}
                disabled={phone.length !== 10}
                variant="primary"
                className="w-full"
              >
                Send OTP
              </Button>
            </div>
          ) : (
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium mb-2">OTP</label>
                <input
                  type="text"
                  placeholder="6-digit OTP"
                  maxLength="6"
                  value={otp}
                  onChange={(e) => setOtp(e.target.value.replace(/\D/g, ''))}
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary text-center text-2xl tracking-widest"
                />
              </div>
              <Button
                onClick={handleVerifyOTP}
                disabled={otp.length !== 6}
                variant="primary"
                className="w-full"
              >
                Verify OTP
              </Button>
              <Button
                onClick={() => { setStep('phone'); setPhone(''); setOtp(''); }}
                variant="outline"
                className="w-full"
              >
                Change Phone Number
              </Button>
            </div>
          )}
        </div>
      </Card>
    </div>
  );
}

function App() {
  const [state, dispatch] = useReducer(appReducer, INITIAL_STATE);
  const [selectedHub, setSelectedHub] = useState(null);

  const handleSelectHub = (hubType) => {
    setSelectedHub(hubType);
  };

  const handleLogin = (user, userType) => {
    dispatch({ type: 'LOGIN', payload: { user, userType } });
  };

  const handleLogout = () => {
    dispatch({ type: 'LOGOUT' });
    setSelectedHub(null);
  };

  if (!state.currentUser) {
    if (!selectedHub) {
      return <LandingPage onSelectHub={handleSelectHub} />;
    }
    return <LoginPage onLogin={handleLogin} userType={selectedHub} />;
  }

  return state.userType === 'student'
    ? <StudentApp state={state} dispatch={dispatch} onLogout={handleLogout} />
    : <SchoolApp state={state} dispatch={dispatch} onLogout={handleLogout} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
