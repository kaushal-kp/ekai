version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ekai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ekai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ekai_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ekai_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ekai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ekai-network

  redis:
    image: redis:7-alpine
    container_name: ekai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ekai-network

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: ekai-server
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ekai}:${POSTGRES_PASSWORD:-ekai_dev_password}@postgres:5432/${POSTGRES_DB:-ekai_dev}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-random-string-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES:-5}
      APAAR_API_URL: ${APAAR_API_URL:-https://api.apaar.education.gov.in/v1}
      APAAR_API_KEY: ${APAAR_API_KEY:-demo-key}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ekai-network
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: ekai-client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - ekai-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  ekai-network:
    driver: bridge
